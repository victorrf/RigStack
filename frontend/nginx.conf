server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Resolver interno do Docker — necessário para lazy-resolve do upstream
    resolver 127.0.0.11 valid=30s;
    set $controller_upstream http://controller:8080;

    # Proxy /api/* e /agent/* para o controller
    location /api/ {
        proxy_pass $controller_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /agent/ {
        proxy_pass $controller_upstream;
        proxy_set_header Host $host;
    }

    # React Router — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
