services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rigstack
      POSTGRES_USER: rigstack
      POSTGRES_PASSWORD: rigstack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./controller/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rigstack"]
      interval: 5s
      timeout: 3s
      retries: 10

  controller:
    build:
      context: .
      dockerfile: controller/Dockerfile
    ports:
      - "8080:8080"   # REST API (frontend)
      - "9090:9090"   # gRPC (agents bare-metal)
    environment:
      DATABASE_URL: postgres://rigstack:rigstack@postgres:5432/rigstack
      GRPC_PORT: "9090"
      HTTP_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - controller
    restart: unless-stopped

  # NOTA: O agent NÃO roda em Docker.
  # Ele precisa de acesso direto ao kernel (KVM, libvirt, ip netns, iptables).
  # Instale-o como serviço systemd em cada hypervisor bare-metal:
  #   cd agent && sudo ./install.sh <CONTROLLER_IP>:9090

volumes:
  postgres_data:
